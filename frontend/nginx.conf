server {
    listen 80;
    
    # 1. Increase this. 10M is often too small for high-res PDFs + Form Data overhead.
    client_max_body_size 50M; 
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        # 2. Ensure the trailing slash consistency
        proxy_pass http://api-gateway:8080/api/;
        
        # 3. Essential Headers for Identity and Security
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 4. Handle large file uploads without dropping the connection
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 5. Timeouts (Processing a bill/PDF can take time)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;

        # 6. Buffering (Optional: helps with large uploads)
        proxy_request_buffering off;
    }
}