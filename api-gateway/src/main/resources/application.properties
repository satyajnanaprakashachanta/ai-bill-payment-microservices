spring.application.name=api-gateway
server.port=8080

# Route to File Service
spring.cloud.gateway.server.webmvc.routes[0].id=file-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://file-service:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/file/**

# Route to AI Service
spring.cloud.gateway.server.webmvc.routes[1].id=ai-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://ai-service:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/ai/**

# Route to Verification Service
spring.cloud.gateway.server.webmvc.routes[2].id=verification-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://verification-service:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/verify/**

# Route to Payment Service
spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://payment-service:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/payment/**

# Route to Notification Service
spring.cloud.gateway.server.webmvc.routes[4].id=notification-service
spring.cloud.gateway.server.webmvc.routes[4].uri=http://notification-service:8085
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/notification/**

# Disable form filter to allow multipart
spring.cloud.gateway.server.webmvc.filter.form-filter.enabled=false

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB